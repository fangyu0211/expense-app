<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>修改消費紀錄</title>

    <!-- Bootstrap（讓頁面變好看，可選但推薦） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm p-4">

        <h3 class="mb-4">✏️ 修改消費紀錄</h3>

        <!-- row[0]=id -->
        <form action="/update/{{ row[0] }}" method="POST">

            <!-- 金額 -->
            <div class="mb-3">
                <label class="form-label">金額</label>
                <input name="amount" type="number" class="form-control"
                       value="{{ row[1] }}" required>
            </div>

            <!-- 類別 -->
            <div class="mb-3">
                <label class="form-label">類別</label>
                <select name="category" class="form-control">

                    <option {% if row[2] == '飲食' %}selected{% endif %}>飲食</option>
                    <option {% if row[2] == '交通' %}selected{% endif %}>交通</option>
                    <option {% if row[2] == '娛樂' %}selected{% endif %}>娛樂</option>
                    <option {% if row[2] == '購物' %}selected{% endif %}>購物</option>
                    <option {% if row[2] == '其他' %}selected{% endif %}>其他</option>

                </select>
            </div>

            <!-- 日期 -->
            <div class="mb-3">
                <label class="form-label">日期</label>
                <input name="date" type="date" class="form-control"
                       value="{{ row[3] }}" required>
            </div>

            <!-- 備註 -->
            <div class="mb-3">
                <label class="form-label">備註</label>
                <input name="note" class="form-control"
                       value="{{ row[4] }}">
            </div>

            <!-- 按鈕 -->
            <button type="submit" class="btn btn-primary">
                更新資料
            </button>

            <a href="/" class="btn btn-secondary">
                取消
            </a>

        </form>

    </div>

</div>

</body>
</html>
