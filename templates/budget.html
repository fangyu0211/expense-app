<!DOCTYPE html>
<html>
<head>
    <title>預算設定</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-4">

        <h3>💰 設定每月預算</h3>

        <form method="POST">

            <div class="mb-3">
                <label>月份</label>
                <input type="month"
                       name="month"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>預算金額</label>
                <input type="number"
                       name="amount"
                       class="form-control">
            </div>

            <button class="btn btn-success">
                儲存預算
            </button>

        </form>

    </div>

</div>

</body>
</html>
